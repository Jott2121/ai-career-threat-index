name: Deploy explorer to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["site/**", "data/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site (explorer + data)
        run: |
          mkdir -p _site/data
          cp site/index.html site/style.css site/app.js _site/
          cp data/ai-career-threat-index.json data/ai-career-threat-index.csv data/soc-crosswalk.csv _site/data/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
